spring.datasource.url=jdbc:postgresql://localhost/medschedule
spring.datasource.username=postgres
spring.datasource.password=123456
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# A chave secreta agora será lida da variável de ambiente API_SECURITY_TOKEN_SECRET
# que é carregada a partir do arquivo .env
api.security.token.secret=${API_SECURITY_TOKEN_SECRET}
